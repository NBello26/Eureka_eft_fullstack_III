name: CI/CD Eureka Server

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_EUREKA }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_EUREKA }}:latest

      - name: Desplegar vía SSM
        run: |
          # 1. Enviamos el comando y capturamos el ID
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_EUREKA_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands":[
                "set -e",
                "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
                "docker pull ${{ secrets.ECR_REPO_URL_EUREKA }}:latest",
                "docker stop eureka-server || true",
                "docker rm eureka-server || true",
                "docker run -d --name eureka-server -p 8761:8761 -e JAVA_OPTS=\"-Xmx256m\" --memory=\"350m\" ${{ secrets.ECR_REPO_URL_EUREKA }}:latest"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)
            
          echo "Comando enviado con ID: $COMMAND_ID. Esperando ejecución en EC2..."
            
          # 2. Obligamos a GitHub a esperar a que la EC2 termine la tarea
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_EUREKA_INSTANCE_ID }}
            
          # 3. Traemos los logs para verlos directo en GitHub
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_EUREKA_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text